<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katina Card</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #dfe4ea;
      }

      .wrap {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }

      img {
        width: min(92%, 760px);
        height: auto;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.16));
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="/static/assets/home-katina.svg" alt="Katina love card" />
    </div>
  </body>
</html>
