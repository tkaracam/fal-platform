    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const elements = Array.from(document.querySelectorAll('.svg-animated path, .svg-animated circle, .svg-animated rect, .svg-animated ellipse, .svg-animated polygon, .svg-animated polyline, .svg-animated line, .svg-animated g'));
        
        // Calculate center for spatial sorting
        const svg = document.querySelector('.svg-animated svg');
        if (!svg) return;
        
        const svgRect = svg.getBoundingClientRect();
        const centerX = svgRect.width / 2;
        const centerY = svgRect.height / 2;

        // Sort elements based on animation type
        const type = 'fade';
        
        if (type === 'fade') {
          // Sort top-left to bottom-right
          elements.sort((a, b) => {
            const rA = a.getBoundingClientRect();
            const rB = b.getBoundingClientRect();
            return (rA.left + rA.top) - (rB.left + rB.top);
          });
        } else if (type === 'ripple' || type === 'scale') {
          // Sort center outward
          elements.sort((a, b) => {
            const rA = a.getBoundingClientRect();
            const rB = b.getBoundingClientRect();
            const dA = Math.hypot((rA.left + rA.width/2) - centerX, (rA.top + rA.height/2) - centerY);
            const dB = Math.hypot((rB.left + rB.width/2) - centerX, (rB.top + rB.height/2) - centerY);
            return dA - dB;
          });
        } else if (type === 'wave') {
          // Sort left to right
          elements.sort((a, b) => {
            const rA = a.getBoundingClientRect();
            const rB = b.getBoundingClientRect();
            return rA.left - rB.left;
          });
        } else if (type === 'scale' && 'false' === 'false') {
           // Randomize for scale pop effect if not using specific sort
           elements.sort(() => Math.random() - 0.5);
        }

        // Apply delays and specific properties
        elements.forEach((el, i) => {
          // Stagger delay
          const delay = 0 + (i * 0.05);
          el.style.animationDelay = delay + 's';
          el.style.transformOrigin = 'center';
          
          // Setup for draw animation
          if (type === 'draw' && (el.tagName === 'path' || el.tagName === 'line' || el.tagName === 'circle' || el.tagName === 'rect')) {
             const length = el.getTotalLength ? el.getTotalLength() : 1000;
             el.style.strokeDasharray = length;
             el.style.strokeDashoffset = length;
          }
        });
      });
    </script>
